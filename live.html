<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Broadcast Screen - Auction</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CSS styles -->
    <link rel="stylesheet" href="app.css">
    <!-- Flaticon Uicons -->
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>
<body class="min-h-screen flex flex-col bg-[#f8f9fc] text-gray-900 overflow-hidden p-6 md:p-8" data-theme="light">
    <!-- Read-only Spectator / Projector View forced to Light theme -->
    
    <!-- Topbar -->
    <header class="flex justify-between items-center mb-8 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-50 border border-theme flex items-center justify-center text-[#134e8e]">
                <i class="fi fi-rr-screen text-2xl"></i>
            </div>
            <div>
                <h1 id="broadcast-auction-title" class="text-xl font-black tracking-tight leading-tight">Live Player Auction</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-[10px] font-bold text-red-500 uppercase tracking-widest flex items-center gap-1.5 bg-red-50/50 border border-red-200 px-2.5 py-0.5 rounded-full shrink-0">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                        Live Broadcast
                    </span>
                    <span id="broadcast-active-section-badge" class="hidden text-[10px] font-bold text-blue-400 bg-blue-500/10 border border-blue-500/20 px-2.5 py-0.5 rounded-full uppercase tracking-wider truncate">
                        Section: <span id="broadcast-active-section-name">None</span>
                    </span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Grid Dashboard layout -->
    <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch overflow-hidden">
        
        <!-- Left Section: Turn Team & Time Remaining -->
        <div class="lg:col-span-5 flex flex-col gap-6">
            <!-- Active Team Card -->
            <div class="card-flat bg-white border-theme flex-1 flex flex-col justify-center items-center p-8 relative">
                <span class="px-4 py-1.5 bg-blue-50 text-[#134e8e] border border-blue-100 rounded-full text-xs font-black uppercase tracking-widest mb-4">Active Team Turn</span>
                <h2 id="live-leading-team" class="text-4xl md:text-5xl lg:text-6xl font-black text-gray-950 tracking-tight text-center leading-tight">None</h2>
            </div>

            <!-- Selection Time Card -->
            <div class="card-flat bg-white border-theme flex-1 flex flex-col justify-center items-center p-8 relative">
                <span class="px-4 py-1.5 bg-red-50 text-red-600 border border-red-100 rounded-full text-xs font-black uppercase tracking-widest mb-2">Selection Time</span>
                <div id="live-timer" class="text-7xl lg:text-8xl font-black font-mono text-red-500 select-none animate-pulse">--</div>
            </div>
        </div>

        <!-- Right Section: Student Card -->
        <div class="lg:col-span-7 flex flex-col">
            <div id="last-selection-card-container" class="h-full">
                <!-- Populated dynamically by JS -->
            </div>
        </div>
    </div>

    <!-- Firebase JS SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- Core JS -->
    <script src="app.js"></script>

    <!-- Spectator Script -->
    <script>
        let teamsData = [];
        let candidatesData = [];
        let auctionState = {};
        let countdownInterval = null;

        function initBroadcastSync() {
            // 1. Sync Teams (standings)
            db.collection('teams').onSnapshot(snap => {
                teamsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderLeaderboard();
            });

            // 2. Sync Candidates (purchased roster tracking)
            db.collection('candidates').onSnapshot(snap => {
                candidatesData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderLeaderboard();
                renderRecentlySold();
                syncActivePlayerUI();
            });

            // 3. Sync Live State
            db.collection('config').doc('auctionState').onSnapshot(doc => {
                if (doc.exists) {
                    auctionState = doc.data();
                    syncActivePlayerUI();
                    if (auctionState.title) {
                        document.getElementById('broadcast-auction-title').innerText = auctionState.title;
                    }
                }
            });
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard-container');
            if (!container) return;

            // Compute roster stats for each team
            const teamsWithStats = teamsData.map(team => {
                const roster = candidatesData.filter(c => c.team === team.name && c.status === 'sold');
                const spent = roster.reduce((sum, c) => sum + (parseInt(c.bidPrice) || 0), 0);
                const purse = parseInt(team.purse) || 10000;
                const remaining = purse - spent;

                return {
                    ...team,
                    spent,
                    remaining,
                    rosterCount: roster.length
                };
            });

            // Sort teams by roster count descending
            teamsWithStats.sort((a, b) => b.rosterCount - a.rosterCount);

            container.innerHTML = teamsWithStats.map(team => {
                return `
                    <div class="p-3.5 border border-theme bg-gray-50/50 rounded-2xl flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <span class="w-3.5 h-3.5 rounded-full shrink-0" style="background-color: ${team.color || '#fff'}"></span>
                            <div>
                                <h4 class="font-bold text-sm text-gray-900">${team.name}</h4>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">Roster: ${team.rosterCount}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderRecentlySold() {
            const container = document.getElementById('sold-ticker-container');
            if (!container) return;

            const soldPlayers = candidatesData.filter(c => c.status === 'sold');
            // Sort by updatedAt or bidPrice, let's keep recent 5
            soldPlayers.sort((a, b) => {
                const tA = a.updatedAt ? a.updatedAt.toDate().getTime() : 0;
                const tB = b.updatedAt ? b.updatedAt.toDate().getTime() : 0;
                return tB - tA; // descending
            });

            const recentSold = soldPlayers.slice(0, 5);

            if (recentSold.length === 0) {
                container.innerHTML = `<div class="text-xs text-gray-500">No players sold yet.</div>`;
                return;
            }

            container.innerHTML = recentSold.map(cand => {
                const teamObj = teamsData.find(t => t.name === cand.team);
                const tColor = teamObj ? teamObj.color : '#fff';

                return `
                    <div class="p-3 border border-theme bg-gray-50/50 rounded-2xl flex items-center gap-4 shrink-0">
                        <div class="flex flex-col">
                            <span class="font-bold text-xs text-gray-900 leading-tight">${cand.name}</span>
                            <span class="text-[9px] font-semibold text-gray-500 mt-0.5 uppercase flex items-center gap-1.5">
                                <span class="w-1.5 h-1.5 rounded-full inline-block" style="background-color: ${tColor}"></span>
                                ${cand.team}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function syncActivePlayerUI() {
            const badge = document.getElementById('broadcast-active-section-badge');
            const nameLbl = document.getElementById('broadcast-active-section-name');
            if (badge && nameLbl) {
                if (auctionState.activeSection) {
                    badge.classList.remove('hidden');
                    nameLbl.innerText = `${auctionState.activeSection} | Set: ${auctionState.activeRoundName || 'N/A'}`;
                } else {
                    badge.classList.add('hidden');
                }
            }

            const activeTeam = (auctionState.turnQueue && auctionState.turnQueue.length > 0) 
                ? auctionState.turnQueue[auctionState.currentTurnIndex || 0] 
                : '';

            document.getElementById('live-leading-team').innerText = activeTeam || 'None';

            // Show Last Selection Card
            const selectionContainer = document.getElementById('last-selection-card-container');
            if (selectionContainer) {
                if (auctionState.lastSelectedCandId) {
                    const lastCand = candidatesData.find(c => c.id === auctionState.lastSelectedCandId);
                    if (lastCand && lastCand.status === 'sold') {
                        const teamObj = teamsData.find(t => t.name === lastCand.team);
                        const tColor = teamObj ? teamObj.color : '#ccc';
                        
                        selectionContainer.innerHTML = `
                            <div class="card-flat bg-white border-theme h-full flex flex-col p-8 justify-between relative overflow-hidden animate-fade-in">
                                <!-- Header with Badge -->
                                <div class="flex justify-between items-center mb-6 shrink-0">
                                    <span class="px-3.5 py-1.5 bg-green-100 text-green-700 font-extrabold text-xs uppercase tracking-widest rounded-full">🎉 Drafted Candidate</span>
                                    <span class="font-mono text-base font-extrabold text-gray-500 bg-gray-50 border border-theme px-3 py-1 rounded-xl">#${lastCand.chestNo}</span>
                                </div>

                                <!-- Student Media + Details Area -->
                                <div class="flex-1 flex flex-col md:flex-row gap-8 items-center justify-center my-auto">
                                    <!-- Student Image / Avatar -->
                                    <div class="w-48 h-48 bg-gray-50 rounded-2xl overflow-hidden border border-theme flex items-center justify-center shrink-0 shadow-sm relative">
                                        ${lastCand.imageUrl ? `
                                            <img src="${lastCand.imageUrl}" class="w-full h-full object-cover" alt="${lastCand.name}">
                                        ` : `
                                            <div class="w-full h-full flex flex-col items-center justify-center text-gray-300 gap-2">
                                                <i class="fi fi-rr-user text-6xl"></i>
                                                <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">No Image Uploaded</span>
                                            </div>
                                        `}
                                    </div>

                                    <!-- Student Data -->
                                    <div class="flex-1 min-w-0 text-center md:text-left space-y-4">
                                        <div>
                                            <h3 class="text-2xl md:text-3xl font-black text-gray-950 leading-tight tracking-tight truncate">${lastCand.name}</h3>
                                            <p class="text-sm font-semibold text-gray-400 uppercase tracking-widest mt-1">${lastCand.section} Section</p>
                                        </div>
                                        
                                        <div class="grid grid-cols-2 gap-3 pt-2">
                                            <div class="p-3 bg-gray-50 rounded-xl border border-theme">
                                                <span class="text-[9px] font-bold uppercase text-gray-400 block tracking-wider">Category</span>
                                                <span class="text-sm font-black text-gray-900 mt-0.5 block">${lastCand.category || 'Category A'}</span>
                                            </div>
                                            <div class="p-3 bg-gray-50 rounded-xl border border-theme">
                                                <span class="text-[9px] font-bold uppercase text-gray-400 block tracking-wider">Base Price</span>
                                                <span class="text-sm font-black font-mono text-gray-900 mt-0.5 block">${lastCand.basePrice || '1000'}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Footer showing drafting team -->
                                <div class="mt-6 pt-6 border-t border-theme shrink-0 flex items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        <span class="w-4 h-4 rounded-full border border-theme shadow-sm" style="background-color: ${tColor}"></span>
                                        <span class="text-xs font-semibold text-gray-400">Drafted By:</span>
                                        <span class="text-sm font-black text-gray-950">${lastCand.team}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        renderEmptySelectionPlaceholder();
                    }
                } else {
                    renderEmptySelectionPlaceholder();
                }
            }

            function renderEmptySelectionPlaceholder() {
                selectionContainer.innerHTML = `
                    <div class="card-flat bg-white border-theme h-full flex flex-col justify-center items-center p-8 text-center text-gray-400">
                        <div class="w-20 h-20 bg-gray-50 rounded-full border border-theme flex items-center justify-center mb-4 text-gray-300 shadow-sm">
                            <i class="fi fi-rr-info text-3xl"></i>
                        </div>
                        <h3 class="font-extrabold text-base text-gray-700">No Selections Made Yet</h3>
                        <p class="text-xs text-gray-400 mt-1 max-w-xs">Waiting for the active team to draft a candidate from the pool.</p>
                    </div>
                `;
            }

            handleCountdownClock();
        }

        function handleCountdownClock() {
            if (countdownInterval) clearInterval(countdownInterval);

            if (!auctionState.timerEnd || auctionState.status !== 'started') {
                document.getElementById('live-timer').innerText = "--";
                return;
            }

            const endTime = auctionState.timerEnd.toDate().getTime();

            countdownInterval = setInterval(() => {
                const now = Date.now();
                const diff = Math.ceil((endTime - now) / 1000);

                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('live-timer').innerText = "OUT";
                } else {
                    document.getElementById('live-timer').innerText = diff + 's';
                }
            }, 1000);
        }

        // On Load Page
        document.addEventListener('DOMContentLoaded', () => {
            initBroadcastSync();
            
            // Set light theme default (Strict light theme enforcement)
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('auction-theme', 'light');
        });
    </script>
</body>
</html>
